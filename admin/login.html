<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Girişi — KODZEN TEKNOLOJİ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">

<div class="login-card">
  <!-- Logo -->
  <div class="logo-wrap">
    <span class="brand-logo-text footer-logo-text">KODZEN<span class="brand-brain"> {&#129504;}</span></span>
    <div class="brand-name">KODZEN <span>TEKNOLOJİ</span></div>
    <div class="panel-label">Admin Paneli</div>
  </div>

  <!-- Title -->
  <h4 class="login-title">Giriş Yap</h4>
  <p class="login-subtitle">Admin paneline erişmek için kimlik bilgilerinizi girin.</p>

  <!-- Alert -->
  <div id="loginAlert" class="admin-alert error mb-3 d-none">
    <i class="bi bi-exclamation-triangle"></i>
    <span id="loginAlertMsg">Kullanıcı adı veya şifre hatalı.</span>
  </div>

  <!-- Form -->
  <form id="loginForm" novalidate>
    <div class="admin-form-group">
      <label class="admin-form-label" for="adminUser">Kullanıcı Adı</label>
      <div style="position:relative">
        <i class="bi bi-person" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim)"></i>
        <input type="text" id="adminUser" class="admin-form-control" style="padding-left:36px" placeholder="Kullanıcı adınız" autocomplete="username" required>
      </div>
    </div>
    <div class="admin-form-group">
      <label class="admin-form-label" for="adminPass">Şifre</label>
      <div style="position:relative">
        <i class="bi bi-lock" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim)"></i>
        <input type="password" id="adminPass" class="admin-form-control" style="padding-left:36px;padding-right:40px" placeholder="••••••••••" autocomplete="current-password" required>
        <button type="button" id="togglePass" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:0.95rem;padding:4px">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-admin-primary w-100 justify-content-center py-3 mt-2" style="font-size:0.95rem">
      <i class="bi bi-box-arrow-in-right"></i> Giriş Yap
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="../index.html" style="color:var(--text-dim);font-size:0.82rem;text-decoration:none">
      <i class="bi bi-arrow-left me-1"></i> Siteye Dön
    </a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('kodzen_admin') === '1') {
    window.location.href = 'panel.html';
  }

  // Toggle password visibility
  document.getElementById('togglePass').addEventListener('click', function () {
    const passInput = document.getElementById('adminPass');
    const eyeIcon = document.getElementById('eyeIcon');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      eyeIcon.className = 'bi bi-eye-slash';
    } else {
      passInput.type = 'password';
      eyeIcon.className = 'bi bi-eye';
    }
  });

  // Login form submit
  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const user = document.getElementById('adminUser').value.trim();
    const pass = document.getElementById('adminPass').value;
    const alert = document.getElementById('loginAlert');
    const alertMsg = document.getElementById('loginAlertMsg');

    if (!user || !pass) {
      alertMsg.textContent = 'Lütfen tüm alanları doldurun.';
      alert.classList.remove('d-none');
      return;
    }

    if (user === '34116' && pass === 'CagriCİnar2026!*') {
      sessionStorage.setItem('kodzen_admin', '1');
      window.location.href = 'panel.html';
    } else {
      alertMsg.textContent = 'Kullanıcı adı veya şifre hatalı.';
      alert.classList.remove('d-none');
      document.getElementById('adminPass').value = '';
      document.getElementById('adminPass').focus();
    }
  });

  // Clear alert on input
  document.getElementById('adminUser').addEventListener('input', () => {
    document.getElementById('loginAlert').classList.add('d-none');
  });
  document.getElementById('adminPass').addEventListener('input', () => {
    document.getElementById('loginAlert').classList.add('d-none');
  });
</script>
</body>
</html>

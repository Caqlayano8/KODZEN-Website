name: Update Teknoloji Blog Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    paths:
      - "scripts/update_teknoloji_blog_feed.py"
      - ".github/workflows/update-teknoloji-blog-feed.yml"

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update feed data
        run: |
          python scripts/update_teknoloji_blog_feed.py

      - name: Commit and push when changed
        run: |
          if [[ -n "$(git status --porcelain -- data/tech-blog-feed.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/tech-blog-feed.json
            git commit -m "Auto-update teknoloji blog feed"
            git push
          else
            echo "No feed changes."
          fi
